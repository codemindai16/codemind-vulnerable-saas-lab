name: CI

on:
  push:
    branches: [main, 'vuln/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: codemind
          POSTGRES_PASSWORD: codemind
          POSTGRES_DB: codemind
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U codemind
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://codemind:codemind@localhost:5432/codemind
      SECRET_KEY: weak-secret-key-123
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 999999
      UPLOAD_DIR: /tmp/uploads
      MAX_UPLOAD_SIZE: 10485760
      REDIS_URL: redis://localhost:6379/0
      WEBHOOK_TIMEOUT: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports || true

      - name: SAST with bandit
        run: bandit -r app/ -f json || true

      - name: Create upload directory
        run: mkdir -p /tmp/uploads

      - name: Run security tests
        run: pytest tests/security/ -v --tb=short

      - name: Run all tests
        run: pytest tests/ -v --tb=short || true
